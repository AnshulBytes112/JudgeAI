version: '3.8'

services:
  app:
    build: .
    container_name: interview-app
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPEECH_ANALYZER_URL: http://speech-analyzer:8000/analyze-speech
      NLP_SCORER_URL: http://nlp-scorer:8001/analyze-content
    volumes:
      - ./uploads:/app/uploads

  speech-analyzer:
    build: ./speech_analyzer
    container_name: speech-analyzer
    ports:
      - "8000:8000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY:-placeholder}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - ./uploads:/app/uploads

  nlp-scorer:
    build: ./nlp_scorer
    container_name: nlp-scorer
    ports:
      - "8001:8001"
