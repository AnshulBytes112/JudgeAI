version: '3.8'

services:
  db:
    image: postgres:15
    container_name: interview-db
    environment:
      POSTGRES_DB: interview_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: interview-app
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/interview_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

  speech-analyzer:
    build: ./speech_analyzer
    container_name: speech-analyzer
    ports:
      - "8000:8000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY:-placeholder}
      AWS_DEFAULT_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
